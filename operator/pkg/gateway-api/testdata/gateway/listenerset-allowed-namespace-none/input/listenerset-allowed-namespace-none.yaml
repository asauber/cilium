apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ls-allowed-ns-none
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  allowedListeners:
    namespaces:
      from: None
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-rejected-none
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: ls-allowed-ns-none
    namespace: gateway-conformance-infra
  listeners:
    - name: extra-http
      port: 8080
      protocol: HTTP
