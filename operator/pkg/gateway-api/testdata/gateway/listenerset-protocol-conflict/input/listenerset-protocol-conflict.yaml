apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ls-proto-conflict
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: cilium
  allowedListeners:
    namespaces:
      from: Same
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-proto-conflict-only
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: ls-proto-conflict
    namespace: gateway-conformance-infra
  listeners:
    - name: tls-on-port-80
      port: 80
      protocol: TLS
      tls:
        mode: Passthrough
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-proto-conflict-mixed
  namespace: gateway-conformance-infra
spec:
  parentRef:
    name: ls-proto-conflict
    namespace: gateway-conformance-infra
  listeners:
    - name: tls-on-port-80
      port: 80
      protocol: TLS
      tls:
        mode: Passthrough
    - name: http-on-port-8080
      port: 8080
      protocol: HTTP
