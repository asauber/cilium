- hostname: "*"
  name: gw-http
  port: 80
  routes:
  - backends:
    - name: backend-service
      namespace: default
      port:
        port: 8080
    path_match: {}
    timeout: {}
  sources:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: listenerset-gateway
    namespace: default
    version: v1
    uid: gw-uid
- hostname: "*"
  name: listenerset-http
  port: 8080
  sources:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: additional-listeners
    namespace: default
    version: v1
    uid: listenerset-uid
