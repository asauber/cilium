- hostname: "*"
  name: gw-http
  port: 80
  sources:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: listenerset-gateway
    namespace: infra
    version: v1
    uid: gw-uid
- hostname: "*"
  name: listenerset-http
  port: 8080
  routes:
  - backends:
    - name: selected-service
      namespace: selected-ns
      port:
        port: 8080
    path_match: {}
    timeout: {}
  sources:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: additional-listeners
    namespace: app-ns
    version: v1
    uid: listenerset-uid
