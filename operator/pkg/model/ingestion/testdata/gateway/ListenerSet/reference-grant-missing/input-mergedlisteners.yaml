- listener:
    name: gw-https
    hostname: gw.example.com
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: my-cert
        namespace: cert-ns
  source:
    name: my-gateway
    namespace: infra
    group: gateway.networking.k8s.io
    version: v1
    kind: Gateway
    uid: gw-uid
- listener:
    name: ls-https
    hostname: ls.example.com
    port: 8443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: my-cert
        namespace: cert-ns
  source:
    name: my-listenerset
    namespace: app-ns
    group: gateway.networking.k8s.io
    version: v1
    kind: ListenerSet
    uid: ls-uid
