- hostname: gw.example.com
  name: gw-https
  port: 443
  tls:
  - name: my-cert
    namespace: cert-ns
  sources:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: my-gateway
    namespace: infra
    version: v1
    uid: gw-uid
- hostname: ls.example.com
  name: ls-https
  port: 8443
  sources:
  - group: gateway.networking.k8s.io
    kind: ListenerSet
    name: my-listenerset
    namespace: app-ns
    version: v1
    uid: ls-uid
